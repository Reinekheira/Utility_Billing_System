server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/utility_db
    username: postgres
    password: ${DB_PASSWORD:246800}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: WASACREGUtilityBillingSystem2024SecretKeyForJWTTokenGenerationAndValidationMustBe256BitsLong
  expiration: 86400000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
